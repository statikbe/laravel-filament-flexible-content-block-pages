# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait a few days after a release before opening update PRs, reducing exposure
    # to compromised releases (supply-chain attack window).
    cooldown:
      default-days: 7
    labels:
      - "dependencies"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait a few days after a release before opening update PRs, reducing exposure
    # to compromised releases (supply-chain attack window).
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
